<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>李涵羚｜數位名片</title>

<style>
html, body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
    overflow-y: auto;
    overflow-x: hidden; /* 🔥 完全鎖橫向 */
    overscroll-behavior-x: none;
    max-width: 100%;
}

/* 🌈 背景動畫（已修正不影響scroll） */
.bg {
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200vw;   /* 🔥 關鍵修正 */
    height: 200vh;  /* 🔥 關鍵修正 */
    background: linear-gradient(45deg, #ffe6f0, #a0e7e5, #b4f8c8, #90dbf4);
    background-size: 400% 400%;
    animation: move 12s ease infinite;
    z-index: -1;
    transition: background 0.6s ease;
    pointer-events: none;
}

@keyframes move {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 📱 滑動容器 */
.container {
    height: 100dvh;
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
}

/* 卡片區 */
.section {
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    scroll-snap-align: start;
}

/* 卡片 */
.card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 340px;
    text-align: center;
    box-shadow: 0 12px 30px rgba(0,0,0,0.1);
}

/* 頭像 */
.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 20px;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 文字 */
h1 {
    font-size: 22px;
    margin: 10px 0;
}

p {
    color: #666;
    font-size: 14px;
    margin-bottom: 25px;
}

/* 按鈕 */
.buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.btn {
    padding: 10px 16px;
    border-radius: 999px;
    border: none;
    background: #ffd6e0;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.btn:hover {
    transform: translateY(-2px);
}

/* 波紋 */
.ripple {
    position: fixed; /* 🔥 防止撐開畫面 */
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    transform: scale(0);
    animation: ripple 0.6s linear;
    pointer-events: none;
}

@keyframes ripple {
    to {
        transform: scale(10);
        opacity: 0;
    }
}

/* 裝飾 */
.decor {
    position: fixed;
    z-index: -1;
    opacity: 0.6;
    pointer-events: none;
}

.decor-left {
    top: 20px;
    left: 10px;
    width: 120px;
}

.decor-right {
    bottom: 20px;
    right: 10px;
    width: 140px;
}

@media (max-width: 480px) {
    .decor-left { width: 90px; }
    .decor-right { width: 100px; }
}
</style>
</head>

<body>

<div class="bg"></div>

<img src="https://i.postimg.cc/75Ls58Bt/melody.png" class="decor decor-left">
<img src="https://i.postimg.cc/mPrXPfdq/pudding.png" class="decor decor-right">

<div class="container">

<div class="section">
    <div class="card">
        <div class="avatar">
            <img src="https://i.postimg.cc/k25123jk/your-photo.jpg" alt="avatar">
        </div>

        <h1>李涵羚</h1>
        <p>我是熱愛小說和睡覺的交大學生，周休五日</p>

        <div class="buttons">
            <a href="https://www.instagram.com/ohinjun/" target="_blank">
                <button class="btn" onclick="changeToPurple()">Instagram</button>
            </a>
            <a href="mailto:lena0526.la14@nycu.edu.tw">
                <button class="btn" onclick="changeToPurple()">Gmail</button>
            </a>
            <a href="https://page.line.me/115covhy" target="_blank">
                <button class="btn" onclick="changeToPurple()">Line</button>
            </a>
        </div>
    </div>
</div>

<div class="section">
    <div class="card">
        <h1>✨ 滑動成功</h1>
        <p>這裡可以放你的專題 / 作品</p>
    </div>
</div>

</div>

<script>
// 紫色
function changeToPurple() {
    document.querySelector('.bg').style.background = "#d8b4f8";
}

// 色盤
const colors = [
"#f4c7c3",
"#f7d6bf",
"#f4e1c1",
"#d7e6d5",
"#cfe0e8",
"#e2d6f3"
];

document.body.addEventListener("pointerdown", function(e) {

    // 波紋
    const ripple = document.createElement("span");
    ripple.classList.add("ripple");
    ripple.style.width = ripple.style.height = "100px";
    ripple.style.left = e.clientX - 50 + "px";
    ripple.style.top = e.clientY - 50 + "px";

    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);

    if (e.target.classList.contains("btn")) return;

    const randomColor = colors[Math.floor(Math.random() * colors.length)];
    document.querySelector('.bg').style.background = randomColor;
});
</script>

</body>
</html>
