<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>李涵羚｜數位名片</title>

<style>
html, body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
    overflow-y: auto;
    overflow-x: hidden;
    overscroll-behavior-x: none;
}

/* 🌈 背景 */
.bg {
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200vw;
    height: 200vh;
    background: linear-gradient(45deg, #ffe6f0, #a0e7e5, #b4f8c8, #90dbf4);
    background-size: 400% 400%;
    animation: move 12s ease infinite;
    z-index: -1;
    pointer-events: none;
    transition: background 0.6s ease;
}

@keyframes move {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 滑動 */
.container {
    height: 100dvh;
    overflow-y: auto;
    scroll-snap-type: y mandatory;
}

.section {
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    scroll-snap-align: start;
}

/* 💌 明信片 */
.card {
    display: flex;
    width: 95%;
    max-width: 500px;
    background: #fffafc;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* 左：頭像區 */
.left {
    width: 40%;
    background: #fde2e4;
    display: flex;
    justify-content: center;
    align-items: center;
}

.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    overflow: hidden;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 右：文字區 */
.right {
    width: 60%;
    padding: 20px;
    text-align: left;
    position: relative;
}

/* 分隔線（郵件風） */
.right::before {
    content: "";
    position: absolute;
    left: 0;
    top: 10%;
    height: 80%;
    width: 2px;
    background: repeating-linear-gradient(
        to bottom,
        #ccc,
        #ccc 6px,
        transparent 6px,
        transparent 12px
    );
}

/* 文字 */
h1 {
    font-size: 18px;
    margin: 0 0 10px;
}

p {
    font-size: 13px;
    color: #666;
}

/* 按鈕 */
.buttons {
    margin-top: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.btn {
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 999px;
    border: none;
    background: #ffd6e0;
    cursor: pointer;
}

/* 裝飾 */
.decor {
    position: fixed;
    z-index: -1;
    opacity: 0.6;
}

.decor-left { top: 20px; left: 10px; width: 100px; }
.decor-right { bottom: 20px; right: 10px; width: 120px; }

/* 波紋 */
.ripple {
    position: fixed;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    transform: scale(0);
    animation: ripple 0.6s linear;
}

@keyframes ripple {
    to {
        transform: scale(10);
        opacity: 0;
    }
}

/* 📱 手機 */
@media (max-width: 480px) {
    .card {
        flex-direction: column;
    }

    .left, .right {
        width: 100%;
    }

    .right::before {
        display: none;
    }
}
</style>
</head>

<body>

<div class="bg"></div>

<img src="https://i.postimg.cc/75Ls58Bt/melody.png" class="decor decor-left">
<img src="https://i.postimg.cc/mPrXPfdq/pudding.png" class="decor decor-right">

<div class="container">

<div class="section">
    <div class="card">

        <!-- 左 -->
        <div class="left">
            <div class="avatar">
                <img src="https://i.postimg.cc/k25123jk/your-photo.jpg">
            </div>
        </div>

        <!-- 右 -->
        <div class="right">
            <h1>李涵羚</h1>
            <p>我是熱愛小說和睡覺的交大學生，周休五日</p>

            <div class="buttons">
                <a href="https://www.instagram.com/ohinjun/" target="_blank">
                    <button class="btn" onclick="changeToPurple()">IG</button>
                </a>
                <a href="mailto:lena0526.la14@nycu.edu.tw">
                    <button class="btn" onclick="changeToPurple()">Mail</button>
                </a>
                <a href="https://page.line.me/115covhy" target="_blank">
                    <button class="btn" onclick="changeToPurple()">Line</button>
                </a>
                <a href="https://lenalee-sh.github.io/digital-card/" target="_blank">
                    <button class="btn" onclick="changeToPurple()">架設好在伺服器上的完整版網站，手機電腦適用</button>
                </a>
            </div>
        </div>

    </div>
</div>

<div class="section">
    <div class="card">
        <div class="right">
            <h1>✨ 我的作品</h1>
            <p>這裡可以放你的 LLM 專題 / 設計作品</p>
        </div>
    </div>
</div>

</div>

<script>
function changeToPurple() {
    document.querySelector('.bg').style.background = "#d8b4f8";
}

const colors = ["#f4c7c3","#f7d6bf","#f4e1c1","#d7e6d5","#cfe0e8","#e2d6f3"];

document.body.addEventListener("pointerdown", function(e) {

    // 按鈕區不觸發
    if (e.target.closest(".buttons")) return;

    // 波紋
    const ripple = document.createElement("span");
    ripple.className = "ripple";
    ripple.style.width = ripple.style.height = "100px";
    ripple.style.left = e.clientX - 50 + "px";
    ripple.style.top = e.clientY - 50 + "px";

    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);

    // 顏色
    const color = colors[Math.floor(Math.random() * colors.length)];
    document.querySelector('.bg').style.background = color;
});
</script>

</body>
</html>
